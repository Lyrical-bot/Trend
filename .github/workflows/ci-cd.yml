name: Python application CI/CD with Azure Web App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Azure App Service Python이 자동으로 PYTHONPATH에 추가하는 경로에 패키지 설치
        if [ -f Backend/requirements.txt ]; then pip install -r Backend/requirements.txt --target=".python_packages/lib/site-packages"; fi
        
    - name: Lint and Syntax check
      run: |
        python -m py_compile Backend/*.py
        
    - name: Upload artifact for deployment jobs
      uses: actions/upload-artifact@v4
      with:
        name: python-app
        path: |
          .
          !.git
          !.github

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: python-app
        path: .

    - name: Zip artifact for deployment
      run: |
        # 배포 패키지 압축 (.python_packages 포함)
        zip -r release.zip . -x "*.git*" -x "*venv*" -x "*.github*" -x "*__pycache__*"

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME || 'trend-predict-backend' }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: release.zip
