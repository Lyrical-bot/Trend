name: Python application CI/CD with Azure Web App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f Backend/requirements.txt ]; then pip install -r Backend/requirements.txt; fi
        
    - name: Lint and Syntax check
      run: |
        # 파이썬 파일들의 기본 구문 오류(Syntax Error) 빌드 검증
        python -m py_compile Backend/*.py
        
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: Zip artifact for deployment
      run: |
        # 배포 패키지 압축 (가상환경 venv 및 git 폴더 제외)
        zip -r release.zip . -x "*.git*" -x "*venv*" -x "*.github*" -x "*__pycache__*"

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME || 'trend-predict-backend' }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: release.zip
