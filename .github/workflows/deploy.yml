name: Deploy FastAPI Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4
      
    - name: 파이썬 3.11 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: 패키지 의존성 설치
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 서비스 배포 (템플릿)
      run: |
        echo "✅ 여기에 실제 클라우드 배포 스크립트를 작성합니다."
        echo "예: AWS EC2, GCP, Heroku, Render 등의 배포 명령어"
        # 예: ssh 호스트에 접속해서 git pull 후 uvicorn 재시작
